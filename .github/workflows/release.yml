name: Release

# Tagging `v*` builds the CLI for every supported host and attaches the binaries
# to a GitHub Release. A `cargo install` needs a Rust toolchain; a downloadable
# binary does not — which is the difference between "interesting repo" and
# "tool people actually run".
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,  target: aarch64-apple-darwin,      ext: ""     }
          - { os: macos-13,      target: x86_64-apple-darwin,       ext: ""     }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu,  ext: ""     }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # rusqlite is vendored (`bundled`), so this compiles SQLite from source —
      # no system libsqlite3 needed on any runner.
      - name: Build
        run: cargo build --release --bin kedge --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/kedge${{ matrix.ext }}"
          test -f "$bin" || { echo "::error::binary not found at $bin"; exit 1; }
          mkdir -p dist
          name="kedge-${{ github.ref_name }}-${{ matrix.target }}"
          # Ship the license with the binary: BSL is source-available, not OSI
          # open source, and recipients need the terms in the same archive.
          cp LICENSE README.md "$bin" dist/ 2>/dev/null || cp "$bin" dist/
          cd dist
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            7z a "../$name.zip" ./* >/dev/null
          else
            tar czf "../$name.tar.gz" ./*
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: kedge-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true # reviewed before it goes public
          body: |
            ## Install

            Download the archive for your platform below, extract, and put `kedge` on your `PATH`.
            Verify against `SHA256SUMS` before running.

            From source:

            ```bash
            cargo install --git https://github.com/SturdyRobot/kedge --bin kedge
            ```

            ## Licensing

            Kedge is released under the **Business Source License 1.1** — free for
            non-commercial use, evaluation, and internal non-revenue use. Commercial
            use requires a license. Converts to Apache 2.0 on the Change Date.
