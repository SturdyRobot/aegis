name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release

  # `cargo *--workspace` skips the excluded crates (see root Cargo.toml), so the
  # wasm demo — which ships on the public site — would rot silently. This job is
  # the guard: kedge-core must stay wasm-clean, and kedge-web must still build.
  wasm:
    name: wasm · core stays portable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Guards the target-gated tokio/uuid deps and web-time Instant: if someone
      # reintroduces a native-only dependency into core, this fails here rather
      # than in the browser.
      - name: kedge-core builds for wasm32
        run: cargo build -p kedge-core --target wasm32-unknown-unknown

      - name: kedge-web (excluded crate) builds for wasm32
        run: cargo build --manifest-path crates/kedge-web/Cargo.toml --target wasm32-unknown-unknown --release

      - name: kedge-web clippy
        run: cargo clippy --manifest-path crates/kedge-web/Cargo.toml --target wasm32-unknown-unknown -- -D warnings

  # Supply chain: fail the build on a RustSec *vulnerability* against anything in
  # Cargo.lock. This action, unlike a bare `cargo audit`, also fails on
  # unmaintained-crate advisories — so those are ignored explicitly (see
  # audit.toml for the rationale) to keep the gate about real vulnerabilities.
  audit:
    name: supply chain · cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # number_prefix: unmaintained, transitive via indicatif, no vuln.
          ignore: RUSTSEC-2025-0119
