<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kedge — running in your browser</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #11151f; --edge: #1e2633;
    --fg: #c9d4e5; --dim: #6b7789; --accent: #5ac8fa;
    --think: #b48ead; --act: #ebcb8b; --obs: #a3be8c; --done: #5ac8fa;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(1200px 600px at 50% -10%, #131a26, var(--bg));
    color: var(--fg); font-family: var(--mono); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .wrap { width: 100%; max-width: 780px; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; margin: 0 0 2px; }
  .sub { color: var(--dim); font-size: 12px; margin: 0 0 16px; }
  .sub b { color: var(--accent); font-weight: 600; }
  .term {
    background: var(--panel); border: 1px solid var(--edge); border-radius: 10px;
    overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.45);
  }
  .bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--edge); }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .r { background: #ff5f57; } .y { background: #febc2e; } .g { background: #28c840; }
  .bar .t { color: var(--dim); font-size: 12px; margin-left: 6px; }
  .io { padding: 14px; }
  .prompt-row { display: flex; gap: 8px; }
  input {
    flex: 1; background: #0a0d13; border: 1px solid var(--edge); border-radius: 6px;
    color: var(--fg); font-family: var(--mono); font-size: 13px; padding: 9px 11px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent); color: #04121c; border: 0; border-radius: 6px;
    font-family: var(--mono); font-weight: 700; font-size: 13px; padding: 0 16px; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  .log { margin-top: 14px; font-size: 12.5px; line-height: 1.5; min-height: 120px; }
  .step { opacity: 0; transform: translateY(4px); animation: rise .28s forwards; margin-bottom: 12px; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .phase { font-weight: 700; font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; }
  .think .phase { color: var(--think); } .act .phase { color: var(--act); } .obs .phase { color: var(--obs); }
  .line { color: var(--fg); } .meta { color: var(--dim); }
  .tool { color: var(--act); }
  .answer { border-top: 1px dashed var(--edge); margin-top: 6px; padding-top: 12px; color: var(--done); }
  .stat { display: flex; gap: 16px; color: var(--dim); font-size: 11px; margin-top: 10px; }
  .stat b { color: var(--fg); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Kedge</h1>
    <p class="sub">The deterministic ReAct engine — compiled to WebAssembly, running <b>entirely in this tab</b>. No server. No API key. No network.</p>
    <div class="term">
      <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="t">kedge · wasm32-unknown-unknown</span></div>
      <div class="io">
        <div class="prompt-row">
          <input id="goal" value="Refactor the auth module and add tests" spellcheck="false" />
          <button id="run">Run</button>
        </div>
        <div class="log" id="log"></div>
        <div class="stat" id="stat" hidden>
          <span>steps <b id="s-steps">0</b></span>
          <span>tokens <b id="s-tokens">0</b></span>
          <span>engine <b>kedge-core</b></span>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import init, { WasmKedgeAgent } from "./pkg/kedge_web.js";

    const $ = (id) => document.getElementById(id);
    const log = $("log"), stat = $("stat");
    let ready = false;

    const PHASE = {
      read_context:    { css: "act", label: "Act" },
      search_code:     { css: "act", label: "Act" },
      run_verification:{ css: "act", label: "Act" },
    };
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    async function boot() {
      await init();          // fetch + instantiate the .wasm
      ready = true;
      $("run").disabled = false;
    }

    function renderStep(step) {
      // Thought line
      const t = document.createElement("div");
      t.className = "step think";
      t.innerHTML = `<div class="phase">Think</div><div class="line">${esc(step.thought)}</div>`;
      log.appendChild(t);

      // Action + observation. `Action` is internally tagged: a tool call is
      // {kind:"tool", name, arguments}; a finish is {kind:"finish", answer}.
      const a = document.createElement("div");
      if (step.action.kind === "tool") {
        a.className = "step act obs";
        a.innerHTML = `<div class="phase">Act</div>` +
          `<div class="line">→ <span class="tool">${esc(step.action.name)}</span>` +
          `<span class="meta"> (${esc(JSON.stringify(step.action.arguments))})</span></div>` +
          (step.observation ? `<div class="line"><span class="phase" style="color:var(--obs)">Observe</span> ${esc(step.observation.content)}</div>` : "");
      } else if (step.action.kind === "finish") {
        a.className = "step answer";
        a.innerHTML = `<div class="phase" style="color:var(--done)">Finish</div><div class="line">${esc(step.action.answer)}</div>`;
      }
      log.appendChild(a);
    }

    function esc(s) { return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

    $("run").addEventListener("click", run);
    async function run() {
      if (!ready) return;
      $("run").disabled = true;
      log.innerHTML = ""; stat.hidden = true;
      const goal = $("goal").value.trim() || "Do the task";

      const agent = new WasmKedgeAgent('{"max_steps":6}');
      const steps = [];
      // The wasm streams every finalized step to this callback (as JSON).
      const answer = await agent.execute(goal, (json) => steps.push(JSON.parse(json)));

      // Reveal steps with a live cadence (the pacing is the UI's; the run is done).
      let tokens = 0;
      for (const step of steps) {
        renderStep(step);
        tokens += step.tokens || 0;
        $("s-steps").textContent = step.index + 1;
        $("s-tokens").textContent = tokens;
        stat.hidden = false;
        await sleep(520);
      }
      window.__kedgeDone = { steps: steps.length, tokens, answer };
      $("run").disabled = false;
    }

    boot();
  </script>
</body>
</html>
